spring:
  datasource:
    url: jdbc:postgresql://db:5432/app_db
    username: win
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

internal:
  token: ${INTERNAL_TOKEN:super-secret-key-123}

service-b:
  url: ${SERVICE_B_URL:http://data-api:8081}

jwt:
  secret: ${JWT_SECRET:very-long-random-string-for-signing-jwt-32-chars}
  expiration: 86400000